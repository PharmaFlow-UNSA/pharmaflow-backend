# User Health Service Configuration - Production Profile
# This profile is used for production environments

# Database Configuration - Production
# All values MUST come from environment variables (no defaults for security)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA Configuration for Production
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Disable statistics in production for performance
spring.jpa.properties.hibernate.generate_statistics=false
logging.level.org.hibernate.stat=WARN

# Production logging - only warnings and errors
logging.level.com.pharmaflow.userhealth=INFO
logging.level.org.springframework=WARN

# Eureka Configuration for Production
eureka.client.service-url.defaultZone=${EUREKA_SERVER}
eureka.instance.lease-renewal-interval-in-seconds=10

# Redis-backed token blacklist is expected in production unless explicitly disabled.
redis.enabled=${REDIS_ENABLED:true}
management.health.redis.enabled=${REDIS_HEALTH_ENABLED:true}

# Disable Swagger in production
springdoc.swagger-ui.enabled=false
