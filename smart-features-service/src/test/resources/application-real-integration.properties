spring.datasource.url=${SMARTFEATURES_TEST_DB_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SMARTFEATURES_TEST_DB_USERNAME}
spring.datasource.password=${SMARTFEATURES_TEST_DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
smartfeatures.embedding.enabled=true
smartfeatures.embedding-service.url=${SMARTFEATURES_EMBEDDING_SERVICE_URL}
eureka.client.serviceUrl.defaultZone=${SMARTFEATURES_EUREKA_SERVER_URL:http://localhost:8761/eureka/}
spring.cloud.discovery.enabled=true
eureka.client.enabled=true
smartfeatures.chatbot.confidence-threshold=0.75
