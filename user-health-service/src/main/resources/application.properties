spring.application.name=user-health-service
server.port=${PORT:8081}

# Database Configuration
# These use environment variables with fallback defaults for local development
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/pharmaflow_user_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.generate_statistics=true
logging.level.org.hibernate.stat=DEBUG

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger
springdoc.swagger-ui.enabled=true

spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

eureka.client.service-url.defaultZone=${EUREKA_SERVER:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.lease-renewal-interval-in-seconds=30

# Spring Boot Actuator - Health Checks
management.endpoints.web.exposure.include=health,info,metrics,env,circuitbreakers,ratelimiters
management.endpoint.health.show-details=always
management.health.db.enabled=true
management.health.diskspace.enabled=true
management.health.circuitbreakers.enabled=true
management.info.env.enabled=true

# Resilience4j Circuit Breaker Configuration
resilience4j.circuitbreaker.instances.userHealthService.register-health-indicator=true
resilience4j.circuitbreaker.instances.userHealthService.sliding-window-size=10
resilience4j.circuitbreaker.instances.userHealthService.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.userHealthService.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.userHealthService.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.userHealthService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.userHealthService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.userHealthService.slow-call-rate-threshold=50
resilience4j.circuitbreaker.instances.userHealthService.slow-call-duration-threshold=3s

# Resilience4j Retry Configuration
resilience4j.retry.instances.userHealthService.max-attempts=3
resilience4j.retry.instances.userHealthService.wait-duration=500ms
resilience4j.retry.instances.userHealthService.enable-exponential-backoff=true
resilience4j.retry.instances.userHealthService.exponential-backoff-multiplier=2

# Resilience4j Rate Limiter Configuration
resilience4j.ratelimiter.instances.userHealthService.limit-for-period=100
resilience4j.ratelimiter.instances.userHealthService.limit-refresh-period=1s
resilience4j.ratelimiter.instances.userHealthService.timeout-duration=0s

# Custom instance ID for load balancing testing
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.instance.metadata-map.instance-id=${eureka.instance.instance-id}

# Spring Cloud Config (disabled by default, see bootstrap.properties for configuration)
# To enable centralized configuration, set spring.cloud.config.enabled=true
# and configure CONFIG_SERVER_URI in bootstrap.properties
spring.cloud.config.enabled=false
# JWT Configuration
jwt.secret=${JWT_SECRET:pharmaflow-secret-key-2024-very-long-and-secure-key-for-production}
# Access token: 1 hour
jwt.expiration=3600000
# Refresh token: 7 days
jwt.refresh-expiration=604800000

# Redis Configuration for token blacklist
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000
spring.cache.type=none
spring.cache.redis.time-to-live=600000

# Logging Configuration
logging.level.root=INFO
logging.level.com.pharmaflow.userhealth=DEBUG
logging.level.org.springframework.cloud.gateway=INFO
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

