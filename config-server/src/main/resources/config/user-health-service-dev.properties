# User Health Service Configuration - Development Profile
server.port=8081

# Database Configuration
# For local development, you can override these with environment variables
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/pharmaflow_user_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.generate_statistics=true

# Eureka Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

