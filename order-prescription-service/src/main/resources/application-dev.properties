# Order & Prescription Service Configuration - Development Profile

spring.datasource.url=${DB_URL:jdbc:postgresql://dev-db-server:5432/pharmaflow_order_db}
spring.datasource.username=${DB_USERNAME:pharmaflow_user}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

logging.level.com.pharmaflow.orderprescription=DEBUG
logging.level.org.springframework.web=DEBUG

eureka.client.service-url.defaultZone=${EUREKA_SERVER:http://eureka-dev:8761/eureka/}
