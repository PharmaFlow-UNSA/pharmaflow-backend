# User Health Service Configuration - Development Profile
# This profile is used for shared development environments (not local machines)

# Database Configuration - Development Environment
# Uses environment variables with sensible defaults
spring.datasource.url=${DB_URL:jdbc:postgresql://dev-db-server:5432/pharmaflow_user_db}
spring.datasource.username=${DB_USERNAME:pharmaflow_user}
spring.datasource.password=${DB_PASSWORD}

# JPA Configuration for Development
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Enable detailed logging for development
logging.level.com.pharmaflow.userhealth=DEBUG
logging.level.org.springframework.web=DEBUG

# Eureka Configuration for Development
eureka.client.service-url.defaultZone=${EUREKA_SERVER:http://eureka-dev:8761/eureka/}

