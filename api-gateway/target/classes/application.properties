spring.application.name=api-gateway
server.port=8080

# Exclude Redis auto-configuration when not enabled
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_SERVER:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# JWT Secret (in production use environment variable)
jwt.secret=${JWT_SECRET:pharmaflow-secret-key-2024-very-long-and-secure-key-for-production}
jwt.expiration=86400000

# Internal Service Secret (for inter-service authentication)
internal.service.secret=${INTERNAL_SERVICE_SECRET:pharmaflow-internal-secret-2024-very-secure}

# CORS Configuration (production: set via environment)
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200,https://chess-clunky-conform.ngrok-free.dev,https://pharmaflow.ba}

# Redis Configuration (for token blacklisting and caching)
# Optional - application works without Redis using in-memory fallback
# Set redis.enabled=true to enable Redis (requires Redis server running)
redis.enabled=${REDIS_ENABLED:false}
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000
spring.cache.type=none
spring.cache.redis.time-to-live=600000

# Spring Cloud Gateway Routes
spring.cloud.gateway.routes[0].id=user-health-service
spring.cloud.gateway.routes[0].uri=lb://USER-HEALTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/users/**,/api/auth/**,/api/family-members/**,/api/allergies/**,/api/therapies/**,/api/patient-profiles/**

spring.cloud.gateway.routes[1].id=product-health-service
spring.cloud.gateway.routes[1].uri=lb://PRODUCT-HEALTH-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/products/**,/api/categories/**,/api/substances/**,/api/interactions/**,/api/contraindications/**,/api/substitutes/**

spring.cloud.gateway.routes[2].id=order-prescription-service
spring.cloud.gateway.routes[2].uri=lb://ORDER-PRESCRIPTION-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/orders/**,/api/prescriptions/**,/api/payments/**,/api/auto-refill-subscriptions/**,/api/deliveries/**

spring.cloud.gateway.routes[3].id=pharmacy-inventory-service
spring.cloud.gateway.routes[3].uri=lb://PHARMACY-INVENTORY-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/pharmacies/**,/api/inventory/**,/api/reservations/**

spring.cloud.gateway.routes[4].id=smart-features-service
spring.cloud.gateway.routes[4].uri=lb://SMART-FEATURES-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/symptoms/**,/api/symptom-searches/**,/api/recommendations/**,/api/notifications/**,/api/reminders/**,/api/fraud/**,/api/fraud-rules/**,/api/fraud-checks/**,/api/chatbot/**,/api/faqs/**,/api/admin/faqs/**,/api/chat-sessions/**,/api/chat-messages/**

# Actuator
management.endpoints.web.exposure.include=health,info,routes,gateway,circuitbreakers,ratelimiters,metrics
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true
management.health.redis.enabled=false
management.health.defaults.enabled=true
management.endpoint.gateway.enabled=true

# Resilience4j Circuit Breaker Configuration
resilience4j.circuitbreaker.configs.default.register-health-indicator=true
resilience4j.circuitbreaker.configs.default.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.configs.default.sliding-window-size=10
resilience4j.circuitbreaker.configs.default.minimum-number-of-calls=5
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.configs.default.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.configs.default.slow-call-rate-threshold=100
resilience4j.circuitbreaker.configs.default.slow-call-duration-threshold=60s

# Resilience4j Timeout Configuration
resilience4j.timelimiter.configs.default.timeout-duration=10s
resilience4j.timelimiter.configs.default.cancel-running-future=true

# Rate Limiter (global - protects against DDoS)
resilience4j.ratelimiter.instances.apiGateway.limit-for-period=1000
resilience4j.ratelimiter.instances.apiGateway.limit-refresh-period=1s
resilience4j.ratelimiter.instances.apiGateway.timeout-duration=0s

# Gateway Timeout Settings
spring.cloud.gateway.httpclient.connect-timeout=5000
spring.cloud.gateway.httpclient.response-timeout=30s

# Logging
logging.level.org.springframework.cloud.gateway=INFO
logging.level.com.pharmaflow.gateway=DEBUG
logging.level.io.github.resilience4j=DEBUG
