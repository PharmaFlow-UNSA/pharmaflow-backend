spring.application.name=product-health-service
server.port=${PORT:8083}

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/pharmaflow_product}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=ProductHealthHikariPool

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.generate_statistics=true
logging.level.org.hibernate.stat=DEBUG

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger
springdoc.swagger-ui.enabled=true

spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# Eureka Service Discovery
eureka.client.service-url.defaultZone=${EUREKA_SERVER:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.lease-renewal-interval-in-seconds=30
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.instance.metadata-map.instance-id=${eureka.instance.instance-id}

# Spring Boot Actuator - Health Checks
management.endpoints.web.exposure.include=health,info,metrics,env,circuitbreakers,ratelimiters
management.endpoint.health.show-details=always
management.health.db.enabled=true
management.health.diskspace.enabled=true
management.health.circuitbreakers.enabled=true
management.info.env.enabled=true

# Resilience4j Circuit Breaker
resilience4j.circuitbreaker.instances.productHealthService.register-health-indicator=true
resilience4j.circuitbreaker.instances.productHealthService.sliding-window-size=10
resilience4j.circuitbreaker.instances.productHealthService.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.productHealthService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.productHealthService.wait-duration-in-open-state=10s

# Resilience4j Retry
resilience4j.retry.instances.productHealthService.max-attempts=3
resilience4j.retry.instances.productHealthService.wait-duration=500ms

# Resilience4j Rate Limiter
resilience4j.ratelimiter.instances.productHealthService.limit-for-period=100
resilience4j.ratelimiter.instances.productHealthService.limit-refresh-period=1s

# Spring Cloud Config (disabled by default)
spring.cloud.config.enabled=false

# Logging Configuration
logging.level.root=INFO
logging.level.com.pharmaflow.producthealth=DEBUG
logging.level.org.springframework.cloud=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n


# JWT Configuration (must match user-health-service secret)
jwt.secret=${JWT_SECRET:pharmaflow-secret-key-2024-very-long-and-secure-key-for-production}
jwt.expiration=3600000
# RabbitMQ Configuration
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST:/}
spring.rabbitmq.connection-timeout=60000
spring.rabbitmq.requested-heartbeat=60
spring.rabbitmq.publisher-confirm-type=correlated
spring.rabbitmq.publisher-returns=true
spring.rabbitmq.listener.simple.acknowledge-mode=auto
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.initial-interval=1000
spring.rabbitmq.listener.simple.retry.multiplier=2.0
spring.rabbitmq.listener.simple.retry.max-interval=10000
