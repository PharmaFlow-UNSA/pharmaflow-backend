spring.application.name=order-prescription-service
server.port=${PORT:8087}

# Database Configuration
# These use environment variables with fallback defaults for local development
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/pharmaflow_order_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.generate_statistics=true
logging.level.org.hibernate.stat=DEBUG

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger
springdoc.swagger-ui.enabled=true

spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

eureka.client.service-url.defaultZone=${EUREKA_SERVER:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.lease-renewal-interval-in-seconds=30

# Spring Boot Actuator - Health Checks
management.endpoints.web.exposure.include=health,info,metrics,env,circuitbreakers,ratelimiters
management.endpoint.health.show-details=always
management.health.db.enabled=true
management.health.diskspace.enabled=true
management.health.circuitbreakers.enabled=true
management.info.env.enabled=true

# Resilience4j Circuit Breaker
resilience4j.circuitbreaker.instances.orderPrescriptionService.register-health-indicator=true
resilience4j.circuitbreaker.instances.orderPrescriptionService.sliding-window-size=10
resilience4j.circuitbreaker.instances.orderPrescriptionService.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.orderPrescriptionService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.orderPrescriptionService.wait-duration-in-open-state=10s

# Resilience4j Retry
resilience4j.retry.instances.orderPrescriptionService.max-attempts=3
resilience4j.retry.instances.orderPrescriptionService.wait-duration=500ms
resilience4j.retry.instances.orderPrescriptionService.enable-exponential-backoff=true

# Resilience4j Rate Limiter
resilience4j.ratelimiter.instances.orderPrescriptionService.limit-for-period=100
resilience4j.ratelimiter.instances.orderPrescriptionService.limit-refresh-period=1s

# Custom instance ID for load balancing testing
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.instance.metadata-map.instance-id=${eureka.instance.instance-id}

# Spring Cloud Config (disabled by default, see bootstrap.properties for configuration)
# To enable centralized configuration, set spring.cloud.config.enabled=true
# and configure CONFIG_SERVER_URI in bootstrap.properties
spring.cloud.config.enabled=false

# Logging Configuration
logging.level.root=INFO
logging.level.com.pharmaflow.orderprescription=DEBUG
logging.level.org.springframework.cloud=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

