# Production Configuration for Pharmacy & Inventory Service
spring.application.name=pharmacy-inventory-service
server.port=8084

# Database Configuration (PostgreSQL for production)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/pharmaflow_pharmacy_prod}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Logging
logging.level.root=WARN
logging.level.com.pharmaflow=INFO
logging.level.org.springframework.web=WARN

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
