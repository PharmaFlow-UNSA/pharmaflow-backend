# Production Configuration
spring.application.name=api-gateway
server.port=8443

# SSL/TLS Configuration
server.ssl.enabled=true
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=${SSL_KEY_STORE_PASSWORD:changeit}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=pharmaflow-gateway

# Redirect HTTP to HTTPS
server.ssl.require-ssl=true

# Eureka (Production)
eureka.client.service-url.defaultZone=${EUREKA_SERVER:https://eureka-server:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=false
eureka.instance.hostname=${HOSTNAME:api-gateway}
eureka.instance.secure-port-enabled=true
eureka.instance.secure-port=8443
eureka.instance.non-secure-port-enabled=false

# JWT Secret (MUST be set via environment variable in production)
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Internal Service Secret (MUST be set via environment variable)
internal.service.secret=${INTERNAL_SERVICE_SECRET}

# CORS Configuration (Whitelist production origins)
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:https://app.pharmaflow.ba,https://mobile.pharmaflow.ba}

# Redis Configuration (Production cluster)
spring.data.redis.host=${REDIS_HOST:redis-cluster.internal}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=true
spring.cache.type=redis
spring.cache.redis.time-to-live=600000

# Spring Cloud Gateway Routes (same as dev)
spring.cloud.gateway.routes[0].id=user-health-service
spring.cloud.gateway.routes[0].uri=lb://USER-HEALTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/users/**,/api/auth/**,/api/family-members/**,/api/allergies/**,/api/therapies/**,/api/patient-profiles/**

spring.cloud.gateway.routes[1].id=product-health-service
spring.cloud.gateway.routes[1].uri=lb://PRODUCT-HEALTH-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/products/**,/api/categories/**,/api/substances/**,/api/interactions/**,/api/contraindications/**,/api/substitutes/**

spring.cloud.gateway.routes[2].id=order-prescription-service
spring.cloud.gateway.routes[2].uri=lb://ORDER-PRESCRIPTION-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/orders/**,/api/prescriptions/**,/api/payments/**

spring.cloud.gateway.routes[3].id=pharmacy-inventory-service
spring.cloud.gateway.routes[3].uri=lb://PHARMACY-INVENTORY-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/pharmacies/**,/api/inventory/**,/api/reservations/**

spring.cloud.gateway.routes[4].id=smart-features-service
spring.cloud.gateway.routes[4].uri=lb://SMART-FEATURES-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/symptoms/**,/api/recommendations/**,/api/notifications/**,/api/fraud/**,/api/fraud-rules/**,/api/fraud-checks/**,/api/chatbot/**,/api/faqs/**,/api/admin/faqs/**,/api/chat-sessions/**,/api/chat-messages/**

# Actuator (Restricted in production)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.health.circuitbreakers.enabled=true
management.server.port=9443
management.server.ssl.enabled=true

# Resilience4j Circuit Breaker
resilience4j.circuitbreaker.configs.default.register-health-indicator=true
resilience4j.circuitbreaker.configs.default.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.configs.default.sliding-window-size=10
resilience4j.circuitbreaker.configs.default.minimum-number-of-calls=5
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.configs.default.automatic-transition-from-open-to-half-open-enabled=true

# Resilience4j Timeout
resilience4j.timelimiter.configs.default.timeout-duration=10s
resilience4j.timelimiter.configs.default.cancel-running-future=true

# Rate Limiter (Stricter in production)
resilience4j.ratelimiter.instances.apiGateway.limit-for-period=500
resilience4j.ratelimiter.instances.apiGateway.limit-refresh-period=1s
resilience4j.ratelimiter.instances.apiGateway.timeout-duration=0s

# Gateway Timeout Settings
spring.cloud.gateway.httpclient.connect-timeout=5000
spring.cloud.gateway.httpclient.response-timeout=30s

# Logging (Production - less verbose)
logging.level.org.springframework.cloud.gateway=WARN
logging.level.com.pharmaflow.gateway=INFO
logging.level.io.github.resilience4j=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.file.name=/var/log/pharmaflow/api-gateway.log
logging.file.max-size=10MB
logging.file.max-history=30
