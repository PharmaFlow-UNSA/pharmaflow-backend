server.port=8083

spring.datasource.url=jdbc:postgresql://localhost:4444/pharmaflow
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
smartfeatures.embedding-service.url=${SMARTFEATURES_EMBEDDING_SERVICE_URL:http://localhost:8000}
smartfeatures.embedding.enabled=${SMARTFEATURES_EMBEDDING_ENABLED:true}
smartfeatures.chatbot.confidence-threshold=${SMARTFEATURES_CHATBOT_CONFIDENCE_THRESHOLD:0.75}
