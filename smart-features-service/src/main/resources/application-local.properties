server.port=${SERVER_PORT:8085}

spring.datasource.url=jdbc:postgresql://localhost:5432/pharmaflow_smart_features_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:${EUREKA_SERVER:http://localhost:8761/eureka/}}
eureka.client.enabled=${EUREKA_CLIENT_ENABLED:true}
eureka.client.register-with-eureka=${EUREKA_REGISTER_WITH_EUREKA:true}
eureka.client.fetch-registry=${EUREKA_FETCH_REGISTRY:true}
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.instance.metadata-map.instance-id=${eureka.instance.instance-id}

springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
smartfeatures.embedding-service.url=${SMARTFEATURES_EMBEDDING_SERVICE_URL:http://localhost:8000}
smartfeatures.embedding.enabled=${SMARTFEATURES_EMBEDDING_ENABLED:true}
smartfeatures.embedding-service.auto-start=${SMARTFEATURES_EMBEDDING_SERVICE_AUTO_START:true}
smartfeatures.embedding-service.directory=${SMARTFEATURES_EMBEDDING_SERVICE_DIRECTORY:../embedding-service}
smartfeatures.embedding-service.python-command=${SMARTFEATURES_EMBEDDING_SERVICE_PYTHON_COMMAND:python3}
smartfeatures.embedding-service.model-name=${SMARTFEATURES_EMBEDDING_SERVICE_MODEL_NAME:sentence-transformers/all-MiniLM-L6-v2}
smartfeatures.embedding-service.startup-timeout-seconds=${SMARTFEATURES_EMBEDDING_SERVICE_STARTUP_TIMEOUT_SECONDS:90}
smartfeatures.embedding-service.fail-on-startup-failure=${SMARTFEATURES_EMBEDDING_SERVICE_FAIL_ON_STARTUP_FAILURE:true}
smartfeatures.chatbot.confidence-threshold=${SMARTFEATURES_CHATBOT_CONFIDENCE_THRESHOLD:0.75}
