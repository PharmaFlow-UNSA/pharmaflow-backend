spring.datasource.url=jdbc:h2:mem:smartfeatures;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.flyway.enabled=false
smartfeatures.embedding.enabled=false
smartfeatures.embedding-service.url=http://localhost:8000
smartfeatures.chatbot.confidence-threshold=0.75
smartfeatures.order-service.service-id=order-prescription-service
smartfeatures.product-service.service-id=product-health-service
smartfeatures.user-service.service-id=user-health-service
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.rabbit.enabled=false
jwt.secret=${JWT_SECRET:pharmaflow-secret-key-2024-very-long-and-secure-key-for-production}
pharmaflow.rabbitmq.enabled=false
eureka.client.enabled=false
eureka.client.healthcheck.enabled=true
spring.cloud.discovery.enabled=false
