spring.profiles.active=test
spring.application.name=user-health-service
server.port=8081

# H2 In-Memory Database for Testing
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable Cloud Services during tests
eureka.client.enabled=false
spring.cloud.discovery.enabled=false
spring.cloud.config.enabled=false

jwt.secret=test-jwt-secret-key-for-unit-tests-only-minimum-256-bits-long
jwt.expiration=3600000
jwt.refresh-expiration=604800000

# Redis - disabled in tests (uses in-memory fallback)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
redis.enabled=false
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=none
management.health.redis.enabled=false

# Actuator - disabled in tests
management.endpoints.enabled-by-default=false
management.health.defaults.enabled=false
