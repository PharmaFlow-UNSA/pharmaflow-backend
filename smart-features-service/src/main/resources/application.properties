spring.application.name=smart-features-service
server.port=${SERVER_PORT:8082}
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/pharmaflow_smart_features_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.flyway.baseline-on-migrate=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.health.circuitbreakers.enabled=true
jwt.secret=${JWT_SECRET:pharmaflow-secret-key-2024-very-long-and-secure-key-for-production}

# RabbitMQ saga choreography (Zadatak 8.3)
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
pharmaflow.rabbitmq.enabled=${PHARMAFLOW_RABBITMQ_ENABLED:true}
pharmaflow.rabbitmq.exchange=${PHARMAFLOW_SAGA_EXCHANGE:pharmaflow.saga.exchange}
pharmaflow.rabbitmq.smart-reservation-created-queue=${SMART_RESERVATION_CREATED_QUEUE:smart.reservation.created.queue}
pharmaflow.rabbitmq.smart-reservation-rejected-queue=${SMART_RESERVATION_REJECTED_QUEUE:smart.reservation.rejected.queue}
pharmaflow.rabbitmq.smart-reservation-compensated-queue=${SMART_RESERVATION_COMPENSATED_QUEUE:smart.reservation.compensated.queue}
pharmaflow.rabbitmq.recommendation-reservation-requested-routing-key=${RECOMMENDATION_RESERVATION_REQUESTED_KEY:recommendation.reservation.requested}
pharmaflow.rabbitmq.reservation-created-routing-key=${RESERVATION_CREATED_KEY:reservation.created}
pharmaflow.rabbitmq.reservation-rejected-routing-key=${RESERVATION_REJECTED_KEY:reservation.rejected}
pharmaflow.rabbitmq.reservation-compensation-requested-routing-key=${RESERVATION_COMPENSATION_REQUESTED_KEY:reservation.compensation.requested}
pharmaflow.rabbitmq.reservation-compensated-routing-key=${RESERVATION_COMPENSATED_KEY:reservation.compensated}
pharmaflow.rabbitmq.recommendation-reservation-finalized-routing-key=${RECOMMENDATION_RESERVATION_FINALIZED_KEY:recommendation.reservation.finalized}

# Resilience4j Circuit Breaker for external service calls
resilience4j.circuitbreaker.instances.externalServices.register-health-indicator=true
resilience4j.circuitbreaker.instances.externalServices.sliding-window-size=10
resilience4j.circuitbreaker.instances.externalServices.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.externalServices.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.externalServices.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.externalServices.automatic-transition-from-open-to-half-open-enabled=true

# Resilience4j Retry
resilience4j.retry.instances.externalServices.max-attempts=3
resilience4j.retry.instances.externalServices.wait-duration=500ms
resilience4j.retry.instances.externalServices.enable-exponential-backoff=true

# Resilience4j Rate Limiter
resilience4j.ratelimiter.instances.fraudDetection.limit-for-period=50
resilience4j.ratelimiter.instances.fraudDetection.limit-refresh-period=1s
resilience4j.ratelimiter.instances.fraudDetection.timeout-duration=0s

eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:${EUREKA_SERVER:http://localhost:8761/eureka/}}
eureka.client.enabled=${EUREKA_CLIENT_ENABLED:true}
eureka.client.register-with-eureka=${EUREKA_REGISTER_WITH_EUREKA:true}
eureka.client.fetch-registry=${EUREKA_FETCH_REGISTRY:true}
eureka.client.healthcheck.enabled=${EUREKA_HEALTHCHECK_ENABLED:false}
eureka.instance.prefer-ip-address=true
eureka.instance.lease-renewal-interval-in-seconds=30
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.instance.metadata-map.instance-id=${eureka.instance.instance-id}
eureka.instance.health-check-url-path=/actuator/health
eureka.instance.status-page-url-path=/actuator/info
eureka.instance.metadata-map.management.context-path=/actuator
spring.cloud.loadbalancer.eager-load.enabled=true
spring.cloud.loadbalancer.eager-load.clients[0]=${SMARTFEATURES_PRODUCT_SERVICE_ID:product-health-service}
spring.cloud.loadbalancer.eager-load.clients[1]=${SMARTFEATURES_ORDER_SERVICE_ID:order-prescription-service}
spring.cloud.loadbalancer.eager-load.clients[2]=${SMARTFEATURES_USER_SERVICE_ID:user-health-service}
smartfeatures.embedding-service.url=${SMARTFEATURES_EMBEDDING_SERVICE_URL:http://localhost:8000}
smartfeatures.embedding.enabled=${SMARTFEATURES_EMBEDDING_ENABLED:true}
smartfeatures.embedding-service.auto-start=${SMARTFEATURES_EMBEDDING_SERVICE_AUTO_START:true}
smartfeatures.embedding-service.directory=${SMARTFEATURES_EMBEDDING_SERVICE_DIRECTORY:../embedding-service}
smartfeatures.embedding-service.python-command=${SMARTFEATURES_EMBEDDING_SERVICE_PYTHON_COMMAND:python3}
smartfeatures.embedding-service.model-name=${SMARTFEATURES_EMBEDDING_SERVICE_MODEL_NAME:sentence-transformers/all-MiniLM-L6-v2}
smartfeatures.embedding-service.startup-timeout-seconds=${SMARTFEATURES_EMBEDDING_SERVICE_STARTUP_TIMEOUT_SECONDS:90}
smartfeatures.embedding-service.fail-on-startup-failure=${SMARTFEATURES_EMBEDDING_SERVICE_FAIL_ON_STARTUP_FAILURE:true}
smartfeatures.chatbot.confidence-threshold=${SMARTFEATURES_CHATBOT_CONFIDENCE_THRESHOLD:0.75}
smartfeatures.order-service.service-id=${SMARTFEATURES_ORDER_SERVICE_ID:order-prescription-service}
smartfeatures.product-service.service-id=${SMARTFEATURES_PRODUCT_SERVICE_ID:product-health-service}
smartfeatures.user-service.service-id=${SMARTFEATURES_USER_SERVICE_ID:user-health-service}

# Logging Configuration
logging.level.root=INFO
logging.level.com.pharmaflow.smartfeatures=DEBUG
logging.level.org.springframework.cloud=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
