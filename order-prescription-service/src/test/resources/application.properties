spring.application.name=order-prescription-service
server.port=0
spring.profiles.active=test

# Test JWT secret (any value is fine — must just be present and >= 256 bits for HS256)
jwt.secret=test-secret-key-for-pharmaflow-order-prescription-service-tests-2024

# H2 In-Memory Database for Testing
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Disable Eureka Client during tests
eureka.client.enabled=false
spring.cloud.discovery.enabled=false

# Disable Config Server during tests
spring.cloud.config.enabled=false

# Disable most Actuator endpoints during unit tests, but keep health for the
# Zadatak 8.1 security integration test that verifies /actuator/health is public.
management.endpoints.enabled-by-default=false
management.endpoint.health.enabled=true
management.endpoints.web.exposure.include=health

# Disable RabbitMQ saga choreography during tests — listener bean is gated by
# @ConditionalOnProperty so it is not registered, and the publisher no-ops.
pharmaflow.rabbitmq.enabled=false
management.health.rabbit.enabled=false
